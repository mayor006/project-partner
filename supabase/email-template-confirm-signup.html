<!--
  Paste this into:
    Supabase project → Authentication → Email Templates → "Confirm signup"
  Save. The signup flow will then offer BOTH a 6-digit code AND a clickable link.
-->

<table width="100%" cellpadding="0" cellspacing="0" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f4f4f8; padding:32px 0;">
  <tr>
    <td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:16px; padding:36px 32px; max-width:90%;">
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <div style="display:inline-block; width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#7c3aed,#a855f7); color:#fff; line-height:44px; font-weight:700; font-size:18px;">
              PP
            </div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:8px; font-size:20px; font-weight:700; color:#0f172a;">
            Confirm your email
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:20px; font-size:14px; color:#64748b; line-height:1.55;">
            Welcome to Project Partner. Use this 6-digit code to verify your email:
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:20px;">
            <div style="display:inline-block; padding:14px 20px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; font-family:'SF Mono', ui-monospace, Menlo, Consolas, monospace; font-size:30px; letter-spacing:10px; font-weight:700; color:#0f172a;">
              {{ .Token }}
            </div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:18px; font-size:13px; color:#94a3b8;">
            Or click this button to confirm:
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:24px;">
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block; background:#7c3aed; color:#fff; text-decoration:none; padding:12px 22px; border-radius:10px; font-size:14px; font-weight:600;">
              Confirm my email
            </a>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-top:20px; border-top:1px solid #e2e8f0; font-size:12px; color:#94a3b8; line-height:1.5;">
            If you didn't sign up for Project Partner, you can safely ignore this email.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
